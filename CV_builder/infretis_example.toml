# infretis_example.toml — Minimal CV_builder configuration for new users
#
# This file shows the MINIMUM settings needed to run the CV_builder pipeline.
# Copy this file, adjust the values, and point main.py to it:
#
#   python CV_builder/main.py --toml infretis_example.toml
#
# ─────────────────────────────────────────────────────────────────────────────

[simulation]
# Interface (lambda) values from your ∞RETIS run.
# Copy these from your infretis.toml run file.
interfaces = [1.0, 1.1, 1.2, 1.3, 1.4, 1.5]

# ─────────────────────────────────────────────────────────────────────────────
[cvmat]
# Grid settings for the CV matrix.
n_grid     = 100       # total number of grid points spanning [min, max] interface
selection  = [50]      # which grid indices to compute CVs at (list of ints)
start_grid = 0         # alternative: use these with --grid-mode range
end_grid   = 100
step_size  = 1
nskip      = 0.1       # burn-in: fraction of steps to skip (0.1 = first 10%)

# ─────────────────────────────────────────────────────────────────────────────
[ppa]
output_dir = "CVs"     # where HDF5 output files are written
workers    = 1         # number of parallel workers (increase for multi-core)
lambda_c   = [0]       # index of the "reactant" interface λ_c
lambda_r   = [5]       # index of the "product" interface  λ_r
n_best_obo = 10
n_best_lin = 5
n_try_lin  = 3
n_cvar_list = [1]
optimizer   = "dual_annealing"

[ppa.tmat]
lambda_r_max      = 5
n_cvar_list       = [1]
top_k             = 3
calculate_missing = false
calc_full         = false

[ppa.sg]
sg_grid            = 500
sg_polyorder       = 2
sg_window_frac     = "1/16"
grid_expand_factor = 1.5
n_hist_bins        = 50
discrete_max_unique = 50

[ppa.screening]
initial_temp = 26150.0
maxiter_lin2 = 100
maxiter_lin3 = 500

# ─────────────────────────────────────────────────────────────────────────────
# These settings are required by the pipeline config. Set safe defaults.
[predictive_power]
chemical_system   = "my_system"
n_cvar_list       = [1]
n_best            = 10
optimizer         = "dual_annealing"
optimizer_steps   = 100
parallel_procs    = 1
h5_input          = "CVs/100/CVmat.h5"
calculate_missing = false
recalc_lincomb    = false

# ─────────────────────────────────────────────────────────────────────────────
# Topology: tells CV_builder which atoms are in your system.
# "xyz_data" reads a standard .xyz file — no other information needed.
[topology]
system    = "xyz_data"       # built-in XYZ reader (recommended for new users)
file      = "initial.xyz"    # path to your topology file (relative to this TOML)
cell_size = 0.0              # periodic box length in Å; 0 = non-periodic

# ─────────────────────────────────────────────────────────────────────────────
# CV suite: tells CV_builder which collective variables to compute.
# Start with MinimalCVSuite (one distance CV) and add more as needed.
[cv_modules]
module = "CV_builder/CV_manager/minimal_suite.py"
class  = "MinimalCVSuite"
pairs = [[0, 1]]
use_pbc = true
# Optional custom naming for the output column/group.
# name = "distance_o_h"
# labels = "distance_o_h"
